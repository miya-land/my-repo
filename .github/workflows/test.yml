name: Test
on:
  pull_request:
    paths: ['go/**/*.go'] # goファイル変更時
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # チェックアウト -- ソースコードへのアクセスに必要
      - uses: actions/setup-go@v5 # 言語セットアップ
        with:
          go-version: '1.22'
      - run: go test go/excellent/*go
